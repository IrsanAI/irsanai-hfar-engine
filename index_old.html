<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IrsanAI HFAR Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .neon { text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <!-- Hero -->
  <div class="max-w-6xl mx-auto px-6 py-12">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold neon text-cyan-400 mb-2">HFAR ENGINE</h1>
      <p class="text-2xl text-zinc-400">Header-First + Anchor Read • Automatische README-Optimierung</p>
      <p class="text-sm text-zinc-500 mt-2">IrsanAI Universe Standard v1.0</p>
    </div>

    <!-- Input -->
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 max-w-2xl mx-auto">
      <label class="block text-sm uppercase tracking-widest mb-2 text-cyan-300">GitHub Repo URL</label>
      <div class="flex gap-3">
        <input id="repoUrl" type="text" value="https://github.com/irsanai/IrsanAI-MindScape-3D" 
               class="flex-1 bg-zinc-950 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-cyan-400 text-lg">
        <button onclick="startAnalysis()" 
                class="bg-cyan-500 hover:bg-cyan-400 text-black font-semibold px-10 rounded-2xl flex items-center gap-3">
          <i class="fas fa-bolt"></i>
          ANALYSIEREN
        </button>
      </div>
    </div>

    <!-- Pipeline Steps -->
    <div id="pipeline" class="hidden mt-16 grid grid-cols-3 gap-6">
      <div id="step1" class="bg-zinc-900 rounded-3xl p-6 border border-cyan-400">
        <h3 class="font-bold text-cyan-400">1. Analyse</h3>
        <div id="result1" class="mt-4 text-sm"></div>
      </div>
      <div id="step2" class="bg-zinc-900 rounded-3xl p-6">
        <h3 class="font-bold">2. Layout-Vorschlag</h3>
        <div id="result2" class="mt-4 text-sm"></div>
      </div>
      <div id="step3" class="bg-zinc-900 rounded-3xl p-6">
        <h3 class="font-bold">3. Neues README generieren</h3>
        <div id="result3" class="mt-4 text-sm"></div>
      </div>
    </div>

    <!-- Final Output -->
    <div id="output" class="hidden mt-12">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Dein optimiertes README</h2>
        <div class="flex gap-4">
          <button onclick="copyToClipboard()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-2xl text-sm font-medium">
            <i class="fas fa-copy"></i> COPY
          </button>
          <button onclick="downloadREADME()" class="flex items-center gap-2 bg-zinc-700 hover:bg-zinc-600 px-6 py-3 rounded-2xl text-sm font-medium">
            <i class="fas fa-download"></i> DOWNLOAD .md
          </button>
        </div>
      </div>
      <pre id="newReadme" class="bg-zinc-900 p-8 rounded-3xl overflow-auto max-h-[60vh] text-sm leading-relaxed border border-zinc-700"></pre>
    </div>
  </div>

  <script>
    // === HFAR CORE ENGINE ===
    async function fetchReadme(repoUrl) {
      const match = repoUrl.match(/github\.com\/([^/]+)\/([^/]+)/);
      if (!match) throw new Error("Ungültige GitHub-URL");
      const [, owner, repo] = match;
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/README.md`;
      
      const res = await fetch(apiUrl, { headers: { "Accept": "application/vnd.github.v3+json" }});
      if (!res.ok) throw new Error("README nicht gefunden");
      
      const data = await res.json();
      return atob(data.content); // base64 → Markdown
    }

    function hfarAnalyze(markdown) {
      const lines = markdown.split('\n');
      const headers = [];
      let firstParagraph = "";
      let lastParagraph = "";

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#')) {
          const level = line.match(/^#+/)[0].length;
          const title = line.replace(/^#+\s*/, '');
          headers.push({ level, title, anchor: lines[i+1] ? lines[i+1].slice(0, 120) : "" });
        }
        if (!firstParagraph && line && !line.startsWith('#') && !line.startsWith('![')) firstParagraph = line;
        if (i > lines.length - 5 && line) lastParagraph = line;
      }

      return {
        claim: firstParagraph || "Kein Claim gefunden",
        headers: headers.slice(0, 12), // max 12 für Übersichtlichkeit
        lastLines: lastParagraph,
        rawLength: markdown.length
      };
    }

    const irsanaiStandard = [
      "Hero / Titel + Claim",
      "Sprachumschalter (DE/EN)",
      "Kurzbeschreibung",
      "Core Features (mit Emojis)",
      "Wie es ins Universe passt",
      "Technische Specs / Architecture",
      "Installation / Usage",
      "Roadmap / Next Steps",
      "License + Back to Universe"
    ];

    async function startAnalysis() {
      const url = document.getElementById('repoUrl').value.trim();
      const pipeline = document.getElementById('pipeline');
      pipeline.classList.remove('hidden');

      try {
        // Step 1
        document.getElementById('result1').innerHTML = `<i class="fas fa-spinner fa-spin"></i> Lade README...`;
        const markdown = await fetchReadme(url);
        const analysis = hfarAnalyze(markdown);

        document.getElementById('result1').innerHTML = `
          <strong>Claim:</strong> ${analysis.claim}<br>
          <strong>Gefundene Abschnitte:</strong> ${analysis.headers.length}<br>
          <strong>Tokens gespart:</strong> ~${Math.round(analysis.rawLength * 0.68)} (68 %)
        `;

        // Step 2 – Vergleich
        const missing = irsanaiStandard.filter(s => 
          !analysis.headers.some(h => h.title.toLowerCase().includes(s.toLowerCase().slice(0,8)))
        );
        
        let suggestionHTML = missing.length ? 
          `<strong>Fehlende IrsanAI-Elemente:</strong><ul class="list-disc ml-5 text-amber-300">${missing.map(m => `<li>${m}</li>`).join('')}</ul>` :
          `<span class="text-emerald-400">Perfekt! Passt bereits 100 % zum IrsanAI-Standard.</span>`;

        document.getElementById('result2').innerHTML = suggestionHTML;

        // Step 3 – Generierung (vereinfacht, aber funktional)
        const newMd = `# IrsanAI-Optimiertes README\n\n**Claim:** ${analysis.claim}\n\n## Automatisch erkannt & optimiert mit HFAR\n\n${analysis.headers.map(h => `${'#'.repeat(h.level)} ${h.title}\n${h.anchor}\n`).join('\n')}\n\n## 💡 IrsanAI-Empfehlungen\n${missing.map(m => `- [ ] ${m} hinzufügen`).join('\n') || 'Alles perfekt!'}\n\n---\n*Generiert von irsanai-hfar-engine*`;

        document.getElementById('newReadme').textContent = newMd;
        document.getElementById('output').classList.remove('hidden');

      } catch (e) {
        alert("Fehler: " + e.message);
      }
    }

    function copyToClipboard() {
      const text = document.getElementById('newReadme').textContent;
      navigator.clipboard.writeText(text).then(() => alert("✅ In die Zwischenablage kopiert!"));
    }

    function downloadREADME() {
      const text = document.getElementById('newReadme').textContent;
      const blob = new Blob([text], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'README-optimized.md';
      a.click();
    }
  </script>
</body>
</html>
